              ctx.fillStyle = 'rgba(226,232,240,0.70)';
              ctx.beginPath();
              ctx.arc(bx, by, r, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = 'rgba(255,255,255,0.45)';
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }

          const sx = simState.current.oxygenSplintX;
          const sy = simState.current.oxygenSplintY;
          const splintLen = 78;

          if (simState.current.splintFlaming) {
            simState.current.splintFlameProgress = Math.min(1, simState.current.splintFlameProgress + 0.12);
          } else {
            simState.current.splintFlameProgress = Math.max(0, simState.current.splintFlameProgress - 0.04);
          }

          ctx.save();
          ctx.translate(sx, sy);
          ctx.rotate(-0.08);
          const wood = ctx.createLinearGradient(-splintLen / 2, 0, splintLen / 2, 0);
          wood.addColorStop(0, '#7c4a22');
          wood.addColorStop(0.55, '#a16231');
          wood.addColorStop(1, '#6b3f1f');
          ctx.fillStyle = wood;
          ctx.beginPath();
          ctx.roundRect(-splintLen / 2, -4, splintLen, 8, 3);
          ctx.fill();

          ctx.strokeStyle = 'rgba(255,255,255,0.16)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(-splintLen / 2 + 6, -1);
          ctx.lineTo(splintLen / 2 - 8, -1);
          ctx.stroke();

          if (simState.current.glowingSplintCharged || simState.current.splintFlameProgress > 0) {
            const p = simState.current.splintFlameProgress;
            const flicker = Math.sin(Date.now() / 90) * (2 + p * 3);

            const ember = ctx.createRadialGradient(splintLen / 2 + 2, 0, 0.8, splintLen / 2 + 2, 0, 10);
            ember.addColorStop(0, 'rgba(251,191,36,0.98)');
            ember.addColorStop(0.45, 'rgba(249,115,22,0.82)');
            ember.addColorStop(1, 'rgba(249,115,22,0.06)');
            ctx.fillStyle = ember;
            ctx.beginPath();
            ctx.arc(splintLen / 2 + 2, 0, 9 + p * 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(254,240,138,0.92)';
            ctx.beginPath();
            ctx.arc(splintLen / 2 + 1, 0, 3 + p * 1.4, 0, Math.PI * 2);
            ctx.fill();

            if (p > 0.05) {
              const flameH = 10 + p * 20 + Math.abs(flicker);
              const flameW = 4 + p * 6;

              ctx.beginPath();
              ctx.moveTo(splintLen / 2 + 2, -flameH);
              ctx.quadraticCurveTo(splintLen / 2 - flameW, -flameH * 0.35, splintLen / 2 + 1, 1);
              ctx.quadraticCurveTo(splintLen / 2 + flameW, -flameH * 0.35, splintLen / 2 + 2, -flameH);
              const outerFlame = ctx.createLinearGradient(splintLen / 2 + 2, -flameH, splintLen / 2 + 2, 3);
              outerFlame.addColorStop(0, 'rgba(251,146,60,0.94)');
              outerFlame.addColorStop(0.65, 'rgba(249,115,22,0.85)');
              outerFlame.addColorStop(1, 'rgba(245,158,11,0.5)');
              ctx.fillStyle = outerFlame;
              ctx.fill();

              ctx.beginPath();
              ctx.moveTo(splintLen / 2 + 2, -flameH * 0.72);
              ctx.quadraticCurveTo(splintLen / 2 - flameW * 0.45, -flameH * 0.28, splintLen / 2 + 1, -1);
              ctx.quadraticCurveTo(splintLen / 2 + flameW * 0.45, -flameH * 0.28, splintLen / 2 + 2, -flameH * 0.72);
              const coreFlame = ctx.createLinearGradient(splintLen / 2 + 2, -flameH * 0.72, splintLen / 2 + 2, 0);
              coreFlame.addColorStop(0, 'rgba(255,237,160,0.95)');
              coreFlame.addColorStop(1, 'rgba(254,215,170,0.75)');
              ctx.fillStyle = coreFlame;
              ctx.fill();
            }
          }
          ctx.restore();

          ctx.fillStyle = 'rgba(226,232,240,0.90)';
          ctx.font = '11px monospace';
          ctx.fillText('Drag glowing splint through oxygen bubbles', 130, 196);
          ctx.restore();
        }

        if (equipment.indicatorDropper && showBeaker) {
          const dx = 382;
          const dy = 186;
          const dropY = BY + BH - Math.max(26, (s.volume / 400) * (BH - 20));

          ctx.save();
          ctx.translate(dx, dy);
          ctx.rotate(-0.35);

          const glass = ctx.createLinearGradient(-8, -30, 8, 20);
          glass.addColorStop(0, 'rgba(255,255,255,0.45)');
          glass.addColorStop(1, 'rgba(148,163,184,0.38)');
          ctx.fillStyle = glass;
          ctx.beginPath();
          ctx.roundRect(-7, -22, 14, 50, 7);
          ctx.fill();
          ctx.strokeStyle = 'rgba(226,232,240,0.9)';
          ctx.lineWidth = 1.2;
          ctx.stroke();

          ctx.fillStyle = 'rgba(100,116,139,0.92)';
          ctx.beginPath();
          ctx.roundRect(-10, -32, 20, 12, 5);
          ctx.fill();

          ctx.fillStyle = 'rgba(16,185,129,0.85)';
          ctx.beginPath();
          ctx.moveTo(-2, 28);
          ctx.lineTo(2, 28);
          ctx.lineTo(0, 40);
          ctx.closePath();
          ctx.fill();
          ctx.restore();

          if (s.indicatorPresent && s.volume > 0) {
            ctx.fillStyle = 'rgba(16,185,129,0.72)';
            ctx.beginPath();
            ctx.arc(dx - 18, Math.max(BY + 16, dropY - 5), 2.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        requestRef.current = requestAnimationFrame(draw);
      }, [equipment, isBeakerTargeted, activePractical]);

      useEffect(() => {
        requestRef.current = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(requestRef.current);
      }, [draw]);

      useEffect(() => {
        const interval = setInterval(() => {
          setUiState((prev) => ({
            ...prev,
            temp: Math.round(simState.current.temp),
            volume: Math.round(simState.current.volume),
            ph: Number(simState.current.ph.toFixed(1)),
            gasVolume: Math.round(simState.current.gasVolume)
          }));
        }, 200);
        return () => clearInterval(interval);
      }, []);

      const changeTemp = (delta) => {
        applyThermalChange(delta, 0.01);
        simState.current.temp = Math.max(-10, Math.min(220, simState.current.temp));
        if (delta > 0) {
          simState.current.particles.push({
            type: 'fire',
            x: 220 + (Math.random() - 0.5) * 64,
            y: 590,
            vx: 0,
            vy: -1,
            life: 0.5,
            size: 5,
            color: '#f59e0b'
          });
        }
      };

      const toggleEquipment = (item) => {
        setEquipment((prev) => {
          const next = { ...prev, [item]: !prev[item] };
          if (item === 'bunsen' && !next.bunsen) next.bunsenLit = false;
          return next;
        });

        if (item === 'syringe' && !equipment.syringe) simState.current.gasVolume = 0;
        if (item === 'scales' && equipment.scales) {
          simState.current.scaleSampleMass = 0;
          simState.current.scaleSampleName = null;
        }
      };

      const exitPractical = () => {
        setActivePractical(null);
        setEquipment({
          syringe: false,
          thermometer: true,
          bunsen: false,
          bunsenLit: false,
          crucible: false,
          tripod: false,
          gauze: false,
          scales: false,
          indicatorDropper: false
        });
        setActiveTab('chemicals');
        clearBeaker();
      };

      const equipmentCards = [
        { key: 'syringe', title: 'Gas Syringe', desc: 'Collects reaction gases', emoji: '💉' },
        { key: 'bunsen', title: 'Bunsen Burner', desc: 'Slowly heats apparatus', emoji: '🔥' },
        { key: 'indicatorDropper', title: 'Indicator Dropper', desc: 'Add universal indicator drops', emoji: '🧪' },
        { key: 'crucible', title: 'Crucible', desc: 'For magnesium combustion', emoji: '⚱️' },
        { key: 'tripod', title: 'Tripod', desc: 'Supports crucible/gauze', emoji: '🛠️' },
        { key: 'gauze', title: 'Wire Gauze', desc: 'Distributes heat', emoji: '🧰' },
        { key: 'scales', title: 'Electronic Scales', desc: 'Weigh solid samples', emoji: '⚖️' }
      ];

      return (
        <div className="flex flex-col md:flex-row h-screen w-full bg-slate-900 text-slate-100 font-sans overflow-hidden">
          {isMobilePortrait && (
            <div className="fixed inset-0 z-[120] bg-slate-950/96 flex items-center justify-center p-6">
              <div className="max-w-xs w-full rounded-2xl border border-slate-700 bg-slate-900/95 p-6 text-center shadow-2xl">
                <div className="text-5xl mb-3 rotate-hint-float">📱↔️</div>
                <h2 className="text-lg font-bold text-sky-300">Rotate To Landscape</h2>
                <p className="mt-2 text-sm text-slate-300">This lab works best in landscape mode on mobile. Turn your device sideways to continue.</p>
              </div>
            </div>
          )}

          <div className={`w-full ${isMobileLandscape ? 'md:w-64' : 'md:w-80'} bg-slate-800 border-r border-slate-700 flex flex-col z-20 shadow-xl`}>
            <div className="p-5 border-b border-slate-700 bg-slate-800">
              <h1 className="text-xl font-bold flex items-center gap-2 text-sky-400">
                <FlaskConical className="w-6 h-6" />
                ChemLab Pro
              </h1>
              <p className="text-xs text-slate-400 mt-1">Virtual Workbench</p>
            </div>

            <div className="flex border-b border-slate-700">
              <button
                onClick={() => setActiveTab('chemicals')}
                className={`flex-1 py-3 text-sm font-medium transition-colors ${activeTab === 'chemicals' ? 'text-sky-400 border-b-2 border-sky-400 bg-slate-700/50' : 'text-slate-400 hover:text-slate-200'}`}
              >
                Chemicals
              </button>
              <button
                onClick={() => setActiveTab('equipment')}
                className={`flex-1 py-3 text-sm font-medium transition-colors ${activeTab === 'equipment' ? 'text-sky-400 border-b-2 border-sky-400 bg-slate-700/50' : 'text-slate-400 hover:text-slate-200'}`}
              >
                Equipment
              </button>
            </div>
            <div className="border-b border-slate-700 px-2 py-2 bg-slate-800/70">
              <button
                onClick={() => setActiveTab('practicals')}
                className={`w-full py-2 text-sm font-medium rounded-md transition-colors ${activeTab === 'practicals' ? 'text-sky-300 bg-slate-700/60 border border-sky-500/40' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/40 border border-slate-700'}`}
              >
                Practicals ⚗️
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {activeTab === 'chemicals' ? (
                <>
                  <p className="text-xs text-slate-500 mb-2">Drag chemicals to the beaker</p>
                  {CHEMICALS.map((chem) => (
                    <div
                      key={chem.id}
                      draggable
                      onDragStart={(event) => handleDragStart(event, chem.id)}
                      onClick={() => addChemical(chem.id)}
                      className="w-full group relative p-3 rounded-xl bg-slate-700/50 hover:bg-slate-600 border border-slate-600 hover:border-sky-500 transition-all flex items-center gap-4 text-left cursor-grab active:cursor-grabbing"
                    >
                      <div className="w-10 h-10 rounded-full flex items-center justify-center bg-slate-800 border border-slate-600 text-lg shadow-sm group-hover:scale-110 transition-transform">
                        {chem.icon}
                      </div>
                      <div>
                        <div className="font-semibold text-slate-200">{chem.name}</div>
                        <div className="text-xs text-slate-400">{chem.desc}</div>
                      </div>
                      <GripVertical className="absolute right-3 top-3 text-slate-600 w-4 h-4 opacity-50" />
                    </div>
                  ))}
                </>
              ) : activeTab === 'equipment' ? (
                <>
                  <p className="text-xs text-slate-500 mb-2">Toggle apparatus on bench</p>
                  {equipmentCards.map((item) => (
                    <button
                      key={item.key}
                      onClick={() => toggleEquipment(item.key)}
                      className={`w-full p-4 rounded-xl border transition-all flex items-center gap-4 text-left ${(equipment[item.key]) ? 'bg-sky-900/30 border-sky-500' : 'bg-slate-700/30 border-slate-600 hover:bg-slate-700'}`}
                    >
                      <div className={`w-10 h-10 rounded-full flex items-center justify-center border text-lg ${(equipment[item.key]) ? 'bg-sky-500 text-white border-sky-400' : 'bg-slate-800 border-slate-600 text-slate-400'}`}>
                        {item.emoji}
                      </div>
                      <div>
                        <div className={`font-semibold ${(equipment[item.key]) ? 'text-sky-400' : 'text-slate-200'}`}>{item.title}</div>
                        <div className="text-xs text-slate-400">{item.desc}</div>
                      </div>
                    </button>
                  ))}

                  {equipment.bunsen && (
                    <button
                      onClick={() => setEquipment((prev) => ({ ...prev, bunsenLit: !prev.bunsenLit }))}
                      className={`w-full py-2 rounded-lg font-medium border ${equipment.bunsenLit ? 'bg-amber-500/20 border-amber-400 text-amber-300' : 'bg-slate-700/40 border-slate-600 text-slate-300 hover:bg-slate-700'}`}
                    >
                      {equipment.bunsenLit ? 'Extinguish Bunsen' : 'Ignite Bunsen'}
                    </button>
                  )}

                  {equipment.indicatorDropper && (
                    <div className="rounded-xl border border-slate-600 bg-slate-700/30 p-3 space-y-2">
                      <div className="text-xs text-slate-300">Drop indicator to visualize pH and neutralisation color shift.</div>
                      <button
                        onClick={addIndicatorDrops}
                        className="w-full py-1.5 text-xs rounded bg-emerald-600 hover:bg-emerald-500 text-white"
                      >
                        Add Universal Indicator Drops
                      </button>
                    </div>
                  )}

                  {equipment.scales && (
                    <div className="rounded-xl border border-slate-600 bg-slate-700/30 p-3 space-y-2">
                      <div className="text-xs text-slate-300">Scale reading: {simState.current.scaleSampleMass.toFixed(2)} g</div>
                      <div className="flex gap-2">
                        <button onClick={() => weighSample('mg', 0.5)} className="flex-1 py-1.5 text-xs rounded bg-slate-600 hover:bg-slate-500">Weigh Mg 0.50 g</button>
                        <button onClick={() => weighSample('mg', 1.0)} className="flex-1 py-1.5 text-xs rounded bg-slate-600 hover:bg-slate-500">Weigh Mg 1.00 g</button>
                      </div>
                      {equipment.crucible && (
                        <button onClick={transferScaleToCrucible} className="w-full py-1.5 text-xs rounded bg-sky-600 hover:bg-sky-500">Transfer weighed Mg to crucible</button>
                      )}

                      {equipment.crucible && simState.current.crucibleMgMass > 0 && (
                        <div
                          draggable
                          onDragStart={(event) => handleLabItemDragStart(event, 'crucible_with_mg')}
                          className="w-full py-1.5 text-xs rounded border border-amber-400/40 bg-amber-500/10 text-amber-200 text-center cursor-grab active:cursor-grabbing"
                        >
                          Drag Crucible + Mg onto Gauze
                        </div>
                      )}
                    </div>
                  )}
                </>
              ) : (
                <>
                  <p className="text-xs text-slate-500 mb-2">Load a practical setup into the lab</p>
                  <div className="rounded-xl border border-slate-600 bg-slate-700/30 p-4">
                    <div className="flex items-center gap-2 font-semibold text-slate-100">
                      <span className="w-7 h-7 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center">⚖️</span>
                      <span>Conservation of Mass</span>
                    </div>
                    <div className="text-xs text-slate-400 mt-1">Auto-loads magnesium, electronic scales, crucible, tripod, gauze, and bunsen burner setup.</div>
                    <button onClick={loadConservationPractical} className="mt-3 w-full py-2 rounded-lg bg-sky-600 hover:bg-sky-500 text-white font-medium">Load Practical</button>
                  </div>
                  <div className="rounded-xl border border-slate-600 bg-slate-700/30 p-4">
                    <div className="flex items-center gap-2 font-semibold text-slate-100">
                      <span className="w-7 h-7 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center">💥</span>
                      <span>Hydrogen Squeaky Pop Test</span>
                    </div>
                    <div className="text-xs text-slate-400 mt-1">Loads test tube + bung, delivery tube, gas syringe, and bunsen for lit splint confirmation.</div>
                    <button onClick={loadHydrogenPopPractical} className="mt-3 w-full py-2 rounded-lg bg-sky-600 hover:bg-sky-500 text-white font-medium">Load Practical</button>
                  </div>
                  <div className="rounded-xl border border-slate-600 bg-slate-700/30 p-4">
                    <div className="flex items-center gap-2 font-semibold text-slate-100">
                      <span className="w-7 h-7 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center">🫧</span>
                      <span>Carbon Dioxide Limewater Test</span>
                    </div>
                    <div className="text-xs text-slate-400 mt-1">Loads acid flask, delivery tube, and limewater test tube for classic milky-cloudy CO₂ check.</div>
                    <button onClick={loadLimewaterPractical} className="mt-3 w-full py-2 rounded-lg bg-sky-600 hover:bg-sky-500 text-white font-medium">Load Practical</button>
                  </div>
                  <div className="rounded-xl border border-slate-600 bg-slate-700/30 p-4">
                    <div className="flex items-center gap-2 font-semibold text-slate-100">
                      <span className="w-7 h-7 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center">🔥</span>
                      <span>Oxygen Relight Test</span>
                    </div>
                    <div className="text-xs text-slate-400 mt-1">Loads peroxide flask, catalyst route, delivery tube, and oxygen tube for the glowing splint relight test.</div>
                    <button onClick={loadOxygenRelightPractical} className="mt-3 w-full py-2 rounded-lg bg-sky-600 hover:bg-sky-500 text-white font-medium">Load Practical</button>
                  </div>
                </>
              )}
            </div>

            <div className="p-4 border-t border-slate-700 bg-slate-800/80 backdrop-blur">
              <button
                onClick={activePractical ? exitPractical : clearBeaker}
                className="w-full py-3 px-4 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/30 rounded-lg flex items-center justify-center gap-2 transition-colors font-medium"
              >
                <Trash2 className="w-4 h-4" />
                {activePractical ? 'Exit Practical' : 'Empty Beaker'}
              </button>
            </div>
          </div>

          <div
            className="flex-1 relative flex flex-col bg-gradient-to-br from-slate-900 via-slate-900 to-slate-950"
            onDragEnter={handleDragEnter}
            onDragOver={handleDragOver}
            onDragLeave={handleDragLeave}
            onDrop={handleDrop}
          >
            <button
              onClick={() => setHelpOpenNonce((prev) => prev + 1)}
              className="absolute top-4 left-4 z-20 px-3 py-2 rounded-lg bg-slate-800/85 border border-slate-700 text-slate-200 hover:bg-slate-700 transition-colors text-sm"
            >
              Help
            </button>

            <div className={`absolute ${isMobileLandscape ? 'top-3' : 'top-6'} left-0 right-0 flex justify-center z-10 pointer-events-none`}>
              <div className={`flex ${isMobileLandscape ? 'gap-3 md:gap-4' : 'gap-4 md:gap-8'} bg-slate-800/80 backdrop-blur-md ${isMobileLandscape ? 'p-2 md:p-2.5' : 'p-3 md:p-4'} rounded-2xl border border-slate-700 shadow-2xl`}>
                <MetricItem
                  label="Temperature"
                  value={`${uiState.temp}°C`}
                  icon={<Thermometer className="w-4 h-4 text-orange-400" />}
                  color={uiState.temp > 80 ? 'text-red-400' : 'text-orange-400'}
                />
                <div className="w-px bg-slate-600/50" />
                <MetricItem
                  label="Volume"
                  value={`${uiState.volume} mL`}
                  icon={<Droplets className="w-4 h-4 text-sky-400" />}
                  color="text-sky-400"
                />
                <div className="w-px bg-slate-600/50" />
                <MetricItem
                  label="pH Level"
                  value={uiState.ph.toFixed(1)}
                  icon={<Zap className="w-4 h-4 text-emerald-400" />}
                  color={uiState.ph < 6 ? 'text-red-400' : uiState.ph > 8 ? 'text-purple-400' : 'text-emerald-400'}
                />
                {equipment.syringe && (
                  <>
                    <div className="w-px bg-slate-600/50" />
                    <MetricItem
                      label="Gas Collected"
                      value={`${uiState.gasVolume} mL`}
                      icon={<Gauge className="w-4 h-4 text-slate-300" />}
                      color="text-slate-200"
                    />
                  </>
                )}
              </div>
            </div>

            {uiState.activeReaction && (
              <div className="absolute top-28 left-0 right-0 flex justify-center z-20 pointer-events-none">
                <div className="animate-bounce bg-amber-500 text-slate-900 px-6 py-2 rounded-full font-bold shadow-lg flex items-center gap-2">
                  <Flame className="w-5 h-5" />
                  {uiState.activeReaction}
                </div>
              </div>
            )}

            <div className="flex-1 flex items-center justify-center relative">
              <div
                className="absolute inset-0 opacity-10 pointer-events-none"
                style={{ backgroundImage: 'radial-gradient(#94a3b8 1px, transparent 1px)', backgroundSize: '24px 24px' }}
              />

              <div className={`absolute ${isMobileLandscape ? 'top-2 right-2' : 'top-4 right-4'} z-20 flex flex-col gap-2 bg-slate-800/80 border border-slate-700 rounded-xl p-2 backdrop-blur ${isMobileLandscape ? 'scale-90 origin-top-right' : ''}`}>
                <div className="flex items-center gap-2">
                  <button onClick={() => setZoom(view.zoom - 0.1)} className="px-2 py-1 text-sm rounded bg-slate-700 hover:bg-slate-600">−</button>
                  <span className="text-xs text-slate-300 w-12 text-center">{Math.round(view.zoom * 100)}%</span>
                  <button onClick={() => setZoom(view.zoom + 0.1)} className="px-2 py-1 text-sm rounded bg-slate-700 hover:bg-slate-600">+</button>
                </div>
                <input
                  type="range"
                  min="0.7"
                  max="2"
                  step="0.05"
                  value={view.zoom}
                  onChange={(event) => setZoom(Number(event.target.value))}
                  className="w-28 accent-sky-400"
                />
                <div className="grid grid-cols-3 gap-1 place-items-center text-xs">
                  <span />
                  <button onClick={() => nudgePan(0, -20)} className="w-8 h-8 rounded bg-slate-700 hover:bg-slate-600">↑</button>
                  <span />
                  <button onClick={() => nudgePan(-20, 0)} className="w-8 h-8 rounded bg-slate-700 hover:bg-slate-600">←</button>
                  <button onClick={resetView} className="w-8 h-8 rounded bg-slate-600 hover:bg-slate-500 text-[10px]">R</button>
                  <button onClick={() => nudgePan(20, 0)} className="w-8 h-8 rounded bg-slate-700 hover:bg-slate-600">→</button>
                  <span />
                  <button onClick={() => nudgePan(0, 20)} className="w-8 h-8 rounded bg-slate-700 hover:bg-slate-600">↓</button>
                  <span />
                </div>
              </div>

              <div
                className={`transition-all duration-300 ${activeTab === 'chemicals' ? 'scale-100' : 'scale-95'}`}
                style={{ transform: `translate(${view.offsetX}px, ${view.offsetY}px) scale(${view.zoom * (isMobileLandscape ? 0.78 : 1)})` }}
              >
                <canvas
                  ref={canvasRef}
                  width={520}
                  height={640}
                  onMouseDown={handleCanvasMouseDown}
                  onMouseMove={handleCanvasMouseMove}
                  onMouseUp={handleCanvasMouseUp}
                  onMouseLeave={handleCanvasMouseUp}
                  className="z-10 cursor-crosshair"
                />
              </div>
            </div>

            {doseEditor && (
              <DoseEditor
                doseEditor={doseEditor}
                chemicals={CHEMICALS}
                getDoseConfig={getDoseConfig}
                onChange={(value) => setDoseEditor((prev) => ({ ...prev, amount: Number(value) }))}
                onCancel={cancelDose}
                onConfirm={confirmDose}
              />
            )}

            {(activePractical === 'gas-test-hydrogen' || activePractical === 'gas-test-limewater' || activePractical === 'gas-test-oxygen') && (
              <div className={`absolute ${isMobileLandscape ? 'bottom-18' : 'bottom-24'} left-1/2 -translate-x-1/2 z-20 rounded-xl border border-slate-600 bg-slate-800/90 backdrop-blur ${isMobileLandscape ? 'px-3 py-2' : 'px-4 py-3'} shadow-xl flex items-center gap-3`}>
                <div className="text-xs text-slate-300">
                  {activePractical === 'gas-test-hydrogen'
                    ? `H₂ ready: ${Math.round(simState.current.hydrogenGas)} units`
                    : activePractical === 'gas-test-limewater'
                      ? `CO₂ ready: ${Math.round(simState.current.carbonDioxideGas)} units`
                      : `O₂ ready: ${Math.round(simState.current.oxygenGas)} units`}
                </div>
                {activePractical === 'gas-test-oxygen' && (
                  <button
                    onClick={chargeSplint}
                    className="px-3 py-1.5 text-xs rounded-lg bg-amber-600 hover:bg-amber-500 text-white font-semibold"
                  >
                    {simState.current.glowingSplintCharged ? 'Splint Charged' : 'Charge Glowing Splint'}
                  </button>
                )}
                <button
                  onClick={runGasTest}
                  className="px-3 py-1.5 text-xs rounded-lg bg-sky-600 hover:bg-sky-500 text-white font-semibold"
                >
                  {activePractical === 'gas-test-hydrogen'
                    ? 'Apply Lit Splint'
                    : activePractical === 'gas-test-limewater'
                      ? 'Bubble Through Limewater'
                      : 'Test Relight'}
                </button>
              </div>
            )}

            {activePractical === 'gas-test-oxygen' ? (
              <div className={`${isMobileLandscape ? 'p-3 md:p-4' : 'p-6 md:p-8'} flex justify-center gap-4 z-20`}>
                <button
                  onClick={() => setEquipment((prev) => ({ ...prev, bunsenLit: !prev.bunsenLit }))}
                  className={`px-8 py-4 rounded-full font-bold border transition-all active:scale-95 ${equipment.bunsenLit ? 'bg-amber-500/20 border-amber-400 text-amber-300' : 'bg-slate-700/40 border-slate-600 text-slate-300 hover:bg-slate-700'}`}
                >
                  {equipment.bunsenLit ? 'Turn Bunsen Off' : 'Turn Bunsen On'}
                </button>
              </div>
            ) : activePractical !== 'conservation-of-mass' && (
              <div className={`${isMobileLandscape ? 'p-3 md:p-4' : 'p-6 md:p-8'} flex justify-center gap-4 z-20`}>
                <HoldButton
                  onHold={() => changeTemp(1.5)}
                  className="bg-orange-500/10 hover:bg-orange-500/20 text-orange-400 border border-orange-500/30"
                  icon={<Flame className="w-6 h-6" />}
                  label="HEAT"
                />
                <HoldButton
                  onHold={() => changeTemp(-1.5)}
                  className="bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400 border border-cyan-500/30"
                  icon={<Snowflake className="w-6 h-6" />}
                  label="COOL"
                />
              </div>
            )}
          </div>

          <HelpModal forceOpenNonce={helpOpenNonce} />
        </div>
      );
    }

    function MetricItem({ label, value, icon, color }) {
      return (
        <div className="flex flex-col items-center min-w-[80px]">
          <div className="text-[10px] uppercase tracking-wider text-slate-400 mb-1 flex items-center gap-1">
            {icon} {label}
          </div>
          <div className={`text-2xl font-mono font-bold ${color}`}>{value}</div>
        </div>
      );
    }

    function HoldButton({ onHold, className, icon, label }) {
      const intervalRef = useRef(null);

      const start = (event) => {
        event.preventDefault();
        onHold();
        intervalRef.current = setInterval(onHold, 50);
      };

      const stop = (event) => {
        if (event) event.preventDefault();
        if (intervalRef.current) clearInterval(intervalRef.current);
      };

      return (
        <button
          onMouseDown={start}
          onMouseUp={stop}
          onMouseLeave={stop}
          onTouchStart={start}
          onTouchEnd={stop}
          className={`flex items-center gap-3 px-8 py-4 rounded-full font-bold transition-all active:scale-95 select-none ${className}`}
        >
          {icon}
          <span>{label}</span>
        </button>
      );
    }

    function DoseEditor({ doseEditor, chemicals, getDoseConfig, onChange, onCancel, onConfirm }) {
      const chem = chemicals.find((item) => item.id === doseEditor.chemId);
      if (!chem) return null;
      const cfg = getDoseConfig(chem);
      const amountText = chem.type === 'liquid' ? Math.round(doseEditor.amount) : doseEditor.amount.toFixed(1);
      const progress = ((doseEditor.amount - cfg.min) / (cfg.max - cfg.min)) * 100;

      return (
        <div className="absolute bottom-28 left-1/2 -translate-x-1/2 z-30 w-[min(92vw,540px)] dose-slide-up">
          <div className="rounded-2xl border border-slate-600 bg-slate-800/95 backdrop-blur-lg shadow-2xl p-4 md:p-5">
            <div className="flex items-center justify-between mb-3">
              <div>
                <p className="text-xs uppercase tracking-wider text-slate-400">Drag Drop Dosing</p>
                <h3 className="text-slate-100 font-semibold">{chem.name}</h3>
              </div>
              <div className="text-right">
                <p className="text-xs text-slate-400">Selected {cfg.label}</p>
                <p className="text-xl font-mono font-bold text-sky-300">{amountText} {cfg.unit}</p>
              </div>
            </div>

            <div className="relative h-14 rounded-xl bg-slate-900/70 border border-slate-700 mb-4 overflow-hidden">
              <div className="absolute left-1/2 -translate-x-1/2 top-0 w-1 h-10 bg-sky-300 stream-pulse" style={{ height: `${24 + progress * 0.18}px` }} />
              <div className="absolute left-1/2 -translate-x-1/2 bottom-1 w-28 h-5 rounded-full border border-slate-500 bg-slate-700/40" />
              <div className="absolute left-2 right-2 bottom-1 h-2 rounded-full bg-gradient-to-r from-cyan-500/30 to-blue-400/60" style={{ width: `${Math.max(8, progress)}%` }} />
            </div>

            <input
              type="range"
              min={cfg.min}
              max={cfg.max}
              step={cfg.step}
              value={doseEditor.amount}
              onChange={(event) => onChange(event.target.value)}
              className="w-full accent-sky-400"
            />

            <div className="mt-4 flex gap-3 justify-end">
              <button
                onClick={onCancel}
                className="px-4 py-2 rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-700 transition-colors"
              >
                Cancel
              </button>
              <button
                onClick={onConfirm}
                className="px-4 py-2 rounded-lg bg-sky-500 hover:bg-sky-600 text-white font-semibold transition-colors"
              >
                Add to Beaker
              </button>
            </div>
          </div>
        </div>
      );
    }

    function HelpModal({ forceOpenNonce = 0 }) {
      const [isOpen, setIsOpen] = useState(() => {
        try {
          return localStorage.getItem(LAB_GUIDE_STORAGE_KEY) !== '1';
        } catch {
          return true;
        }
      });

      useEffect(() => {
        if (forceOpenNonce > 0) setIsOpen(true);
      }, [forceOpenNonce]);

      const closeModal = () => {
        setIsOpen(false);
        try {
          localStorage.setItem(LAB_GUIDE_STORAGE_KEY, '1');
        } catch {
        }
      };

      if (!isOpen) return null;

      return (
        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
          <div className="bg-slate-800 border border-slate-700 p-6 rounded-2xl max-w-md w-full shadow-2xl relative">
            <button onClick={closeModal} className="absolute top-4 right-4 text-slate-400 hover:text-white">
              <X className="w-5 h-5" />
            </button>
            <h2 className="text-xl font-bold text-sky-400 mb-4 flex items-center gap-2">
              <Info className="w-5 h-5" /> Lab Guide
            </h2>
            <ul className="space-y-3 text-slate-300 text-sm">
              <li className="flex gap-2">
                <span className="bg-slate-700 text-white rounded px-1.5 py-0.5 text-xs font-mono h-fit">A</span>
                <span>Mg + HCl generates H₂ gas and warms the beaker.</span>
              </li>
              <li className="flex gap-2">
                <span className="bg-slate-700 text-white rounded px-1.5 py-0.5 text-xs font-mono h-fit">B</span>
                <span>CuSO₄ + H₂O forms a blue solution.</span>
              </li>
              <li className="flex gap-2">
                <span className="bg-slate-700 text-white rounded px-1.5 py-0.5 text-xs font-mono h-fit">C</span>
                <span>NH₄NO₃ + H₂O is endothermic and cools the beaker.</span>
              </li>
              <li className="flex gap-2">
                <span className="bg-slate-700 text-white rounded px-1.5 py-0.5 text-xs font-mono h-fit">D</span>
                <span>HCl + NaOH neutralizes toward pH 7.</span>
              </li>
            </ul>
            <button
              onClick={closeModal}
              className="mt-6 w-full bg-sky-500 hover:bg-sky-600 text-white font-semibold py-2 rounded-lg transition-colors"
            >
              Start Experimenting
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ChemistryLab />);
  </script>
</body>
</html>
